name: FE CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: fe-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Typecheck / Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_DIRECTUS_URL: ${{ secrets.VITE_DIRECTUS_URL }}
        run: npm run build

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to VPS
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT }} -H ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync to releases/<sha>
        run: |
          RELEASE_DIR="/var/www/midnight-fe/releases/${{ github.sha }}"
          ssh -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} "mkdir -p $RELEASE_DIR"
          rsync -az --delete -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            dist/ ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:$RELEASE_DIR/

      - name: Atomic symlink switch & prune old releases
        run: |
          ssh -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} bash <<'EOF'
            set -euo pipefail
            cd /var/www/midnight-fe
            ln -sfn releases/${{ github.sha }} current.new
            mv -Tf current.new current
            ls -1dt releases/*/ | tail -n +6 | xargs -r rm -rf
          EOF
